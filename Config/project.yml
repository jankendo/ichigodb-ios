name: IchigoDB

options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"

targets:
  IchigoDB:
    type: application
    platform: iOS
    sources:
      - path: ../Sources
      - path: ../iOS/Assets.xcassets
    info:
      path: ../Sources/Info.plist
    settings:
      base:
        PRODUCT_NAME: IchigoDB
        PRODUCT_BUNDLE_IDENTIFIER: app.ichigodb.native
        SWIFT_VERSION: 5.0
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ../Sources/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  IchigoDBTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ../Tests/IchigoDBTests
    dependencies:
      - target: IchigoDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ichigodb.native.tests
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
  IchigoDBUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ../Tests/IchigoDBUITests
    dependencies:
      - target: IchigoDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ichigodb.native.uitests
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 17.0

schemes:
  IchigoDB:
    build:
      targets:
        IchigoDB: all
    test:
      targets:
        - name: IchigoDBTests
        - name: IchigoDBUITests
