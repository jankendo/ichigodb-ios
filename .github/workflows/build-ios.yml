name: Build iOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: IchigoDB
  PROJECT_PATH: Config/IchigoDB.xcodeproj
  IPA_NAME: IchigoDB
  IPA_ARTIFACT_NAME: ichigodb-ipa
  BUILD_NUMBER: ${{ github.run_number }}
  MARKETING_VERSION: ${{ format('1.0.{0}', github.run_number) }}

jobs:
  validate:
    name: Validate and test
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Supabase config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 scripts/write_supabase_config.py

      - name: Generate Xcode project
        run: xcodegen generate --spec Config/project.yml

      - name: Build for iOS Simulator
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$APP_NAME" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Run unit tests
        run: |
          set -euo pipefail
          DESTINATION="$(xcodebuild -showdestinations -project "$PROJECT_PATH" -scheme "$APP_NAME" 2>/dev/null | sed -n 's/.*platform:iOS Simulator, id:\([^,]*\),.*name:\([^,]*iPhone[^,]*\).*/id=\1/p' | head -n 1)"
          if [[ -z "$DESTINATION" ]]; then
            echo "No iPhone simulator destination found; simulator build already passed."
            exit 0
          fi
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$APP_NAME" \
            -configuration Debug \
            -destination "$DESTINATION" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test

  build:
    name: Build unsigned IPA
    runs-on: macos-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Supabase config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 scripts/write_supabase_config.py

      - name: Generate Xcode project
        run: xcodegen generate --spec Config/project.yml

      - name: Build IPA package
        run: |
          set -euo pipefail
          DERIVED_DATA_PATH="$RUNNER_TEMP/DerivedDataUnsigned"
          EXPORT_PATH="$RUNNER_TEMP/output"
          IPA_PATH="$EXPORT_PATH/$IPA_NAME.ipa"

          rm -rf "$DERIVED_DATA_PATH" "$EXPORT_PATH"
          mkdir -p "$EXPORT_PATH/Payload"

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$APP_NAME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

          APP_PATH="$(find "$DERIVED_DATA_PATH/Build/Products/Release-iphoneos" -maxdepth 1 -name '*.app' | head -n 1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "Unsigned .app bundle was not produced." >&2
            exit 1
          fi

          cp -R "$APP_PATH" "$EXPORT_PATH/Payload/"
          (
            cd "$EXPORT_PATH"
            /usr/bin/zip -qry "$IPA_PATH" Payload
          )

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IPA_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/output/*.ipa
          retention-days: 7
